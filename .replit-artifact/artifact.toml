kind = "web"
previewPath = "/"
title = "Workflow Automation Platform"
version = "1.0.0"
id = "artifacts/workflow-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 22115
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/workflow-app run dev"

[services.env]
PORT = "22115"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/workflow-app", "run", "build"]
publicDir = "artifacts/workflow-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
